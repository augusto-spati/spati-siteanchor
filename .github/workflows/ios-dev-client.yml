name: iOS DEV CLIENT (hot reload)

# Builds an UNSIGNED **development client** .ipa (Debug config) on a free macOS
# runner. Unlike the Release build, this does NOT bake in the JS bundle — it
# loads JS from Metro at runtime, so you build+sideload this ONCE and then every
# JS/TSX change hot-reloads over your LAN in ~1s (no rebuild).
#
# One-time:   trigger this workflow, sideload the resulting IPA with Sideloadly.
# Every day:  run `yarn start:dev` (= expo start --dev-client) on the PC, open the
#             app on the phone, connect to the Metro URL (same Wi-Fi), edit, save.
# Rebuild ONLY when native deps/config change (new native module, app.json plugin).

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn install --frozen-lockfile

      - name: Expo prebuild (iOS native project)
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Archive (unsigned, Debug / dev client)
        run: |
          set -eo pipefail
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -1)
          echo "Workspace: $WORKSPACE"
          xcodebuild -list -workspace "$WORKSPACE"
          BASE=$(basename "$WORKSPACE" .xcworkspace)
          if xcodebuild -list -workspace "$WORKSPACE" -json | grep -q "\"$BASE\""; then
            SCHEME="$BASE"
          else
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);console.log((j.workspace.schemes||[])[0]||'')})")
          fi
          echo "Scheme: $SCHEME"
          # Debug configuration: RN's build phase skips JS bundling in Debug, so the
          # app loads from Metro. expo-dev-client provides the on-device launcher to
          # enter the Metro URL (your PC's LAN IP).
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          set -eo pipefail
          cd build
          APP=$(ls App.xcarchive/Products/Applications/ | head -1)
          echo "App bundle: $APP"
          mkdir -p Payload
          cp -R "App.xcarchive/Products/Applications/$APP" Payload/
          zip -qry SpatiSiteAnchor-devclient.ipa Payload
          ls -la SpatiSiteAnchor-devclient.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpatiSiteAnchor-devclient-ipa
          path: build/SpatiSiteAnchor-devclient.ipa
          if-no-files-found: error
