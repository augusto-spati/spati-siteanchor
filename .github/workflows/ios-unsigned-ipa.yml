name: iOS unsigned IPA (Sideloadly)

# Builds an UNSIGNED .ipa on a free macOS runner (public repo = free minutes).
# You then re-sign it with Sideloadly + a free Apple ID on Windows — no paid
# Apple Developer account, no Mac. Trigger manually from the Actions tab or via
# `gh workflow run`.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn install --frozen-lockfile

      - name: Expo prebuild (iOS native project)
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Archive (unsigned)
        run: |
          set -eo pipefail
          # .xcworkspace is a directory bundle — `-d` lists the path itself, not
          # its contents (otherwise we'd grab contents.xcworkspacedata inside it).
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -1)
          echo "Workspace: $WORKSPACE"
          xcodebuild -list -workspace "$WORKSPACE"
          # Prefer the scheme named after the workspace; fall back to the first one.
          BASE=$(basename "$WORKSPACE" .xcworkspace)
          if xcodebuild -list -workspace "$WORKSPACE" -json | grep -q "\"$BASE\""; then
            SCHEME="$BASE"
          else
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);console.log((j.workspace.schemes||[])[0]||'')})")
          fi
          echo "Scheme: $SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        run: |
          set -eo pipefail
          cd build
          APP=$(ls App.xcarchive/Products/Applications/ | head -1)
          echo "App bundle: $APP"
          mkdir -p Payload
          cp -R "App.xcarchive/Products/Applications/$APP" Payload/
          zip -qry SpatiSiteAnchor-unsigned.ipa Payload
          ls -la SpatiSiteAnchor-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpatiSiteAnchor-unsigned-ipa
          path: build/SpatiSiteAnchor-unsigned.ipa
          if-no-files-found: error
